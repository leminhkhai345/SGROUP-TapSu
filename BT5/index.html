<!doctype html>
<html lang="en">
  <head>

      </div>
      <div class="card">

      </div>

    <h3 class="title3">@KEYFRAMES ANIMATION</h3>
    <div class="container3">
      <div class="box box5">bounce</div>
      <div class="box box6">spin</div>
      <div class="box box7">pulse</div>
      <div class="box box8">slideln</div>
    </div>
    <div class="container4">
      <div></div>
      <div></div>
      <div></div>
